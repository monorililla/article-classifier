services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: article-classifier:latest
    container_name: article-classifier
    ports:
      - "8000:8000"
    # A logs mappát kívülről mountoljuk, így a konténer leállítása után
    # is megmaradnak a runtime logok (a 4. napon írunk struktúrált
    # logot, ezt fogjuk ide szórni).
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
    restart: unless-stopped
